}

}
.rl-stat {
  text-align: right;
}
.rl-stat-val {

}
.rl-stat-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-faint);

}

/* Filters */
.rl-filters { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.rl-filter-group { display: flex; gap: 0.25rem; flex-wrap: wrap; }
.rl-filter-btn {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  padding: 4px 10px;
  border-radius: 20px;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.rl-filter-btn:hover { background: var(--bg-surface); color: var(--fg); }
.rl-filter-btn.active {
  background: var(--bg-card);
  color: var(--fg);
  border-color: var(--border-mid);
}

/* Mood picker */
.mood-section { margin-bottom: 1.5rem; }
.mood-trigger {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--teal);
  background: none;
  border: 0.5px solid var(--teal-border);
  border-radius: var(--radius-sm);
  padding: 5px 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.mood-trigger:hover { background: var(--teal-light); }
.mood-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.5rem;
  margin-top: 0.75rem;
}
.mood-card {
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-align: left;
}
.mood-card:hover { background: var(--bg-card); border-color: var(--border-mid); }
.mood-icon { font-size: 1rem; margin-bottom: 4px; }
.mood-name { font-size: 0.82rem; font-weight: 500; color: var(--fg); }
.mood-desc { font-family: var(--font-mono); font-size: 0.62rem; color: var(--fg-faint); margin-top: 2px; }
.mood-rec {
  background: var(--teal-light);
  border: 0.5px solid var(--teal-border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin-top: 0.75rem;
}
.mood-rec-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 8px;
}
.mood-rec-title { font-family: var(--font-serif); font-size: 1.1rem; color: var(--fg); margin-bottom: 2px; }
.mood-rec-author { font-size: 0.8rem; color: var(--fg-muted); margin-bottom: 8px; }
.mood-rec-why { font-size: 0.82rem; color: var(--fg); line-height: 1.6; font-weight: 300; }
.mood-dismiss {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-mono); font-size: 0.68rem;
  color: var(--teal); margin-top: 10px; padding: 0;
}

/* Book list */
.rl-list { display: flex; flex-direction: column; gap: 0; }
.rl-empty {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--fg-faint);
  text-align: center;
  padding: 3rem 0;
  letter-spacing: 0.06em;
}

/* Book card */
.book-card {
  border-bottom: 0.5px solid var(--border);
  padding: 14px 0;
}
.book-card:first-child { border-top: 0.5px solid var(--border); }
.book-card-main {

  align-items: flex-start;
  gap: 1rem;
  cursor: pointer;
}
.book-left { flex: 1; min-width: 0; }
.book-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
.book-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  padding: 2px 8px;
  border-radius: 20px;
  border: 0.5px solid;
  white-space: nowrap;
}
.book-title {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--fg);
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 2px;
}
.book-author { font-size: 0.8rem; color: var(--fg-muted); font-weight: 300; }
.book-meta {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--fg-faint);
  letter-spacing: 0.04em;
  margin-top: 6px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.book-toggle {
  background: none; border: none; cursor: pointer;
  color: var(--fg-faint); font-size: 0.7rem; padding: 2px; flex-shrink: 0;
  transition: color 0.15s;
}
.book-toggle:hover { color: var(--fg); }

/* Stars */
.book-stars { display: flex; gap: 1px; margin-top: 6px; }
.star { font-size: 0.9rem; cursor: pointer; transition: color 0.1s; }
.star.filled { color: var(--amber); }
.star.empty { color: var(--border-mid); }

/* Expanded detail */
.book-detail {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--border);
  display: none;
}
.book-detail.open { display: block; }
.book-why {
  font-size: 0.83rem;
  color: var(--fg-muted);
  line-height: 1.65;
  font-weight: 300;
  margin-bottom: 10px;
}

  font-family: var(--font-mono);

  text-transform: uppercase;
  color: var(--fg-faint);
  margin-bottom: 4px;
}
.book-notes {
  font-size: 0.83rem;
  color: var(--fg-muted);
  line-height: 1.6;
  font-weight: 300;
}
.book-notes-input {

  border: 0.5px solid var(--border-mid);

  color: var(--fg);

}

.book-notes-save {

.book-notes-add {

  border: none;
  padding: 0;
  letter-spacing: 0.04em;

@media (max-width: 600px) {

  { id:"gr_118", title:"A Brief History of Seven Killings", author:"Marlon James", category:"History / Politics", status:"recommended", source:"Goodreads", why:"", pages:688, hours:23, rating:null, notes:null, moodFit:[] },
];

const CATEGORIES = ["All","Business / Strategy","Finance / Investing","Biography / Memoir","History / Politics","Science / Philosophy"];
const STATUSES   = ["All","recommended","want to read","reading","finished"];

const MOODS = [
  { id:"focused",    label:"Focused",    icon:"◎", desc:"Building expertise" },
  { id:"curious",    label:"Curious",    icon:"◈", desc:"Exploring new areas" },
  { id:"relaxed",    label:"Relaxed",    icon:"◇", desc:"Story-driven, narrative" },
  { id:"energized",  label:"Energized",  icon:"◆", desc:"Ambitious, inspiring" },
  { id:"reflective", label:"Reflective", icon:"◉", desc:"Philosophy, meaning" },
];

const CAT_STYLE = {
  "Business / Strategy":  { bg:"#EAF3DE", text:"#3B6D11", border:"#C0DD97" },
  "Finance / Investing":  { bg:"#E6F1FB", text:"#185FA5", border:"#B5D4F4" },
  "Biography / Memoir":   { bg:"#FAEEDA", text:"#854F0B", border:"#FAC775" },
  "History / Politics":   { bg:"#FAECE7", text:"#993C1D", border:"#F5C4B3" },
  "Science / Philosophy": { bg:"#EEEDFE", text:"#534AB7", border:"#CECBF6" },
};
const STATUS_STYLE = {
  "recommended":  { bg:"#FAEEDA", text:"#854F0B", dot:"#EF9F27" },
  "want to read": { bg:"#F1EFE8", text:"#5F5E5A", dot:"#888780" },
  "reading":      { bg:"#E6F1FB", text:"#185FA5", dot:"#378ADD" },
  "finished":     { bg:"#EAF3DE", text:"#3B6D11", dot:"#639922" },
};
const STATUS_ORDER = ["recommended","want to read","reading","finished"];

// ── State ─────────────────────────────────────────────
const STORAGE_KEY = "nbp-reading-list-v1";
let books = [];
let catFilter = "All";
let statusFilter = "All";
let moodOpen = false;
let activeMood = null;

function loadBooks() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (saved) {
      const ids = new Set(saved.map(b => b.id));
      const missing = BOOKS.filter(b => !ids.has(b.id));
      books = [...saved, ...missing];
    } else {
      books = BOOKS.map(b => ({...b}));
    }
  } catch { books = BOOKS.map(b => ({...b})); }
}
function saveBooks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); } catch {}
}
function getBook(id) { return books.find(b => b.id === id); }
function updateBook(updated) {
  books = books.map(b => b.id === updated.id ? updated : b);
  saveBooks();
}

// ── Stats ──────────────────────────────────────────────
function renderStats() {
  const finished = books.filter(b => b.status === "finished");
  const statsEl = document.getElementById("rl-stats");
  statsEl.innerHTML = [
    [books.length, "Books"],
    [books.filter(b => b.status === "reading").length, "Reading"],
    [finished.length, "Finished"],
    [finished.reduce((s,b) => s + b.hours, 0) + "h", "Read"],
  ].map(([v,l]) => `<div class="rl-stat"><div class="rl-stat-val">${v}</div><div class="rl-stat-label">${l}</div></div>`).join("");
}

// ── Filters ────────────────────────────────────────────
function renderFilters() {
  document.getElementById("status-filters").innerHTML =
    STATUSES.map(s => `<button class="rl-filter-btn${statusFilter===s?" active":""}" data-type="status" data-val="${s}">${s}</button>`).join("");
  document.getElementById("cat-filters").innerHTML =
    CATEGORIES.map(c => `<button class="rl-filter-btn${catFilter===c?" active":""}" data-type="cat" data-val="${c}">${c}</button>`).join("");
}

document.getElementById("status-filters").addEventListener("click", e => {
  const btn = e.target.closest(".rl-filter-btn");
  if (!btn) return;
  statusFilter = btn.dataset.val;
  renderFilters();
  renderList();
});
document.getElementById("cat-filters").addEventListener("click", e => {
  const btn = e.target.closest(".rl-filter-btn");
  if (!btn) return;
  catFilter = btn.dataset.val;
  renderFilters();
  renderList();
});

// ── Mood ───────────────────────────────────────────────
function renderMoodPicker() {
  const picker = document.getElementById("mood-picker");
  picker.style.display = moodOpen ? "block" : "none";
  if (!moodOpen) return;

  if (activeMood) {
    document.getElementById("mood-grid").innerHTML = "";
    const rec = document.getElementById("mood-rec");
    const candidates = books.filter(b => (b.status === "want to read" || b.status === "recommended") && b.moodFit?.includes(activeMood.id));
    const pick = candidates[0] || books.find(b => b.status === "want to read" || b.status === "recommended");
    if (pick) {
      const cs = CAT_STYLE[pick.category] || {};
      rec.style.display = "block";
      rec.innerHTML = `
        <div class="mood-rec">
          <div class="mood-rec-label">${activeMood.icon} recommended for ${activeMood.label.toLowerCase()} mood</div>
          <span class="book-badge" style="background:${cs.bg};color:${cs.text};border-color:${cs.border}">${pick.category}</span>
          <div class="mood-rec-title" style="margin-top:8px">${pick.title}</div>
          <div class="mood-rec-author">${pick.author}</div>
          ${pick.why ? `<div class="mood-rec-why">${pick.why}</div>` : ""}
          <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--teal);margin-top:8px">~${pick.hours}h · ${pick.pages}p</div>
          <button class="mood-dismiss" onclick="activeMood=null;renderMoodPicker()">← pick a different mood</button>
        </div>`;
    }
  } else {
    document.getElementById("mood-rec").style.display = "none";
    document.getElementById("mood-grid").innerHTML = MOODS.map(m =>
      `<button class="mood-card" data-mood="${m.id}">
        <div class="mood-icon">${m.icon}</div>
        <div class="mood-name">${m.label}</div>
        <div class="mood-desc">${m.desc}</div>
      </button>`
    ).join("");
  }
}

document.getElementById("mood-trigger").addEventListener("click", () => {
  moodOpen = !moodOpen;
  if (!moodOpen) activeMood = null;
  renderMoodPicker();
});
document.getElementById("mood-grid").addEventListener("click", e => {
  const card = e.target.closest(".mood-card");
  if (!card) return;
  activeMood = MOODS.find(m => m.id === card.dataset.mood);
  renderMoodPicker();
});

// ── Book list ──────────────────────────────────────────
function starsHTML(rating, id) {
  return [1,2,3,4,5].map(n =>
    `<span class="star ${n <= (rating||0) ? "filled" : "empty"}" data-star="${n}" data-id="${id}">★</span>`
  ).join("");
}

function cardHTML(b) {
  const cs = CAT_STYLE[b.category] || {};
  const ss = STATUS_STYLE[b.status] || {};
  return `
  <div class="book-card" id="card-${b.id}">
    <div class="book-card-main" data-toggle="${b.id}">
      <div class="book-left">
        <div class="book-badges">
          <span class="book-badge" style="background:${cs.bg};color:${cs.text};border-color:${cs.border}">${b.category}</span>
          <span class="book-badge" style="background:${ss.bg};color:${ss.text};border-color:${ss.dot};cursor:pointer" data-cycle="${b.id}">
            <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${ss.dot};margin-right:4px;vertical-align:middle"></span>${b.status}
          </span>
        </div>
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-meta">
          <span>~${b.hours}h</span><span>${b.pages}p</span>${b.source ? `<span>${b.source}</span>` : ""}
        </div>
        ${b.status === "finished" ? `<div class="book-stars">${starsHTML(b.rating, b.id)}</div>` : ""}
      </div>
      <button class="book-toggle" data-toggle="${b.id}">▼</button>
    </div>
    <div class="book-detail" id="detail-${b.id}">
      ${b.why ? `<p class="book-why">${b.why}</p>` : ""}
      ${b.status === "finished" ? `
        <div class="book-notes-label">Notes & takeaways</div>
        ${b.notes
          ? `<p class="book-notes" data-edit-notes="${b.id}" style="cursor:pointer" title="Click to edit">${b.notes}</p>`
          : `<button class="book-notes-add" data-add-notes="${b.id}">+ add notes</button>`
        }` : ""}
    </div>
  </div>`;
}

function renderList() {
  const visible = books.filter(b =>
    (catFilter === "All" || b.category === catFilter) &&
    (statusFilter === "All" || b.status === statusFilter)
  );
  const el = document.getElementById("rl-list");
  if (visible.length === 0) {
    el.innerHTML = `<div class="rl-empty">No books match this filter.</div>`;
    return;
  }
  el.innerHTML = visible.map(cardHTML).join("");
}

// ── Events on book list (delegated) ───────────────────
document.getElementById("rl-list").addEventListener("click", e => {
  // Expand/collapse
  const toggle = e.target.closest("[data-toggle]");
  if (toggle && !e.target.closest("[data-cycle]") && !e.target.closest(".star") && !e.target.closest("[data-edit-notes]") && !e.target.closest("[data-add-notes]")) {
    const id = toggle.dataset.toggle;
    const detail = document.getElementById(`detail-${id}`);
    const btn = document.querySelector(`button.book-toggle[data-toggle="${id}"]`);
    if (detail) {
      const open = detail.classList.toggle("open");
      if (btn) btn.textContent = open ? "▲" : "▼";
    }
    return;
  }

  // Cycle status
  const cycle = e.target.closest("[data-cycle]");
  if (cycle) {
    e.stopPropagation();
    const b = getBook(cycle.dataset.cycle);
    if (!b) return;
    const next = STATUS_ORDER[(STATUS_ORDER.indexOf(b.status) + 1) % STATUS_ORDER.length];
    updateBook({...b, status: next});
    renderStats();
    renderList();
    return;
  }

  // Star rating
  const star = e.target.closest(".star");
  if (star) {
    e.stopPropagation();
    const b = getBook(star.dataset.id);
    if (!b) return;
    updateBook({...b, rating: parseInt(star.dataset.star)});
    const starsEl = document.querySelector(`#card-${b.id} .book-stars`);
    if (starsEl) starsEl.innerHTML = starsHTML(parseInt(star.dataset.star), b.id);
    return;
  }

  // Edit notes
  const editNotes = e.target.closest("[data-edit-notes]");
  if (editNotes) {
    e.stopPropagation();
    const b = getBook(editNotes.dataset.editNotes);
    if (!b) return;
    editNotes.outerHTML = notesEditorHTML(b);
    return;
  }

  // Add notes
  const addNotes = e.target.closest("[data-add-notes]");
  if (addNotes) {
    e.stopPropagation();
    const b = getBook(addNotes.dataset.addNotes);
    if (!b) return;
    addNotes.outerHTML = notesEditorHTML(b);
    return;
  }

  // Save notes
  const saveNotes = e.target.closest("[data-save-notes]");
  if (saveNotes) {
    e.stopPropagation();
    const id = saveNotes.dataset.saveNotes;
    const b = getBook(id);
    const textarea = document.querySelector(`textarea[data-notes-input="${id}"]`);
    if (!b || !textarea) return;
    const notes = textarea.value.trim() || null;
    updateBook({...b, notes});
    const detail = document.getElementById(`detail-${id}`);
    const notesArea = detail.querySelector(".book-notes, .book-notes-add, textarea, [data-save-notes]").closest(".book-notes, .book-notes-add") || detail;
    // Re-render just the notes section
    const wrapper = saveNotes.closest(".notes-editor-wrap");
    if (wrapper) {
      wrapper.outerHTML = notes
        ? `<p class="book-notes" data-edit-notes="${id}" style="cursor:pointer" title="Click to edit">${notes}</p>`
        : `<button class="book-notes-add" data-add-notes="${id}">+ add notes</button>`;
    }
    return;
  }
});

function notesEditorHTML(b) {
  return `<div class="notes-editor-wrap">
    <textarea class="book-notes-input" data-notes-input="${b.id}" rows="3">${b.notes || ""}</textarea>
    <button class="book-notes-save" data-save-notes="${b.id}">Save</button>
  </div>`;
}

// ── Init ───────────────────────────────────────────────
loadBooks();
renderStats();
renderFilters();
renderMoodPicker();
renderList();
</script>

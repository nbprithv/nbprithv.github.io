<style>
/* ── Badge color tokens ───────────────────────── */
:root {
  --s-rec-bg: #FAEEDA;  --s-rec-text: #854F0B;  --s-rec-border: #FAC775;
  --s-want-bg: #F1EFE8; --s-want-text: #5F5E5A; --s-want-border: #D3D1C7;
  --s-read-bg: #E6F1FB; --s-read-text: #185FA5; --s-read-border: #B5D4F4;
  --s-fin-bg: #EAF3DE;  --s-fin-text: #3B6D11;  --s-fin-border: #C0DD97;
}
[data-theme="dark"] {
  --s-rec-bg: #2E1E06;  --s-rec-text: #E8AC50;  --s-rec-border: #6E4010;
  --s-want-bg: #1E1E1B; --s-want-text: #7A7870; --s-want-border: #333330;
  --s-read-bg: #071428; --s-read-text: #6EA8D8; --s-read-border: #1A3A60;
  --s-fin-bg: #0E1C06;  --s-fin-text: #6AAC38;  --s-fin-border: #204810;
}

/* ── Page header ─────────────────────────────── */
.bs-header { margin-bottom: 1.75rem; }
.bs-title-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1rem;
}
.bs-subtitle {
  font-size: 0.8rem;
  color: var(--fg-faint);
  font-weight: 300;
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}
.bs-stats { display: flex; gap: 1.25rem; }
.bs-stat { display: flex; flex-direction: column; }
.bs-stat-val {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--fg);
}
.bs-stat-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-faint);
  margin-top: 3px;
}

/* ── Mood strip ──────────────────────────────── */
.bs-mood-strip {
  background: var(--bg-surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  margin-bottom: 1rem;
  overflow: hidden;
}
.bs-mood-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.75rem 1rem;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
}
.bs-mood-trigger-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teal);
  flex-shrink: 0;
}
.bs-mood-trigger-text {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  color: var(--teal);
}
.bs-mood-trigger-arr {
  margin-left: auto;
  font-size: 0.75rem;
  color: var(--fg-faint);
  transition: transform 0.2s;
}
.bs-mood-trigger-arr.open { transform: rotate(90deg); }
.bs-mood-body {
  display: none;
  border-top: 0.5px solid var(--border);
  padding: 0.75rem 1rem;
}
.bs-mood-body.open { display: block; }
.bs-mood-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 0.4rem;
  margin-bottom: 0.75rem;
}
.bs-mood-btn {
  background: var(--bg-card);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-sm);
  padding: 0.5rem 0.4rem;
  cursor: pointer;
  text-align: center;
  transition: background 0.15s, border-color 0.15s;
}
.bs-mood-btn:hover, .bs-mood-btn.active {
  background: var(--bg);
  border-color: var(--teal-border);
}
.bs-mood-btn-icon { font-size: 0.9rem; margin-bottom: 2px; color: var(--fg-muted); }
.bs-mood-btn-name { font-size: 0.72rem; font-weight: 500; color: var(--fg); display: block; }
.bs-mood-btn-desc {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--fg-faint);
  display: block;
  margin-top: 1px;
  line-height: 1.3;
}
.bs-mood-rec {
  background: var(--teal-light);
  border: 0.5px solid var(--teal-border);
  border-radius: var(--radius-sm);
  padding: 0.9rem 1rem;
  display: none;
}
.bs-mood-rec.show { display: block; }
.bs-mood-rec-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 6px;
}
.bs-mood-rec-title {
  font-family: var(--font-serif);
  font-size: 1.05rem;
  color: var(--fg);
  letter-spacing: -0.01em;
}
.bs-mood-rec-author { font-size: 0.8rem; color: var(--fg-muted); font-weight: 300; margin-bottom: 6px; }
.bs-mood-rec-why { font-size: 0.8rem; color: var(--fg-muted); line-height: 1.6; font-weight: 300; }
.bs-mood-rec-meta { font-family: var(--font-mono); font-size: 0.62rem; color: var(--teal); margin-top: 6px; }
.bs-mood-reset {
  background: none; border: none; cursor: pointer;
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--teal); margin-top: 8px; padding: 0; display: block;
}

/* ── Filters ─────────────────────────────────── */
.bs-filters { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.4rem; }
.bs-filter-row {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.bs-filter-row::-webkit-scrollbar { display: none; }
.bs-filter-pill {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  padding: 5px 11px;
  border-radius: 20px;
  border: 0.5px solid var(--border);
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.bs-filter-pill:hover { background: var(--bg-surface); color: var(--fg); }
.bs-filter-pill.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.bs-search-wrap { position: relative; flex-shrink: 0; }
.bs-search {
  font-family: var(--font-sans);
  font-size: 0.78rem;
  background: var(--bg-surface);
  border: 0.5px solid var(--border-mid);
  border-radius: var(--radius-sm);
  color: var(--fg);
  padding: 5px 28px 5px 10px;
  width: 180px;
  outline: none;
  transition: border-color 0.15s;
}
.bs-search::placeholder { color: var(--fg-faint); }
.bs-search:focus { border-color: var(--teal); }
.bs-search-clear {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--fg-faint);
  cursor: pointer; font-size: 0.7rem; padding: 0; display: none; line-height: 1;
}
.bs-search-clear.visible { display: block; }
.bs-search-clear:hover { color: var(--fg); }

/* ── Book list ───────────────────────────────── */
.bs-list { display: flex; flex-direction: column; }
.bs-empty {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--fg-faint);
  text-align: center;
  padding: 3rem 0;
  letter-spacing: 0.06em;
}

/* ── Book row ────────────────────────────────── */
.bs-book { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); }
.bs-book:first-child { border-top: 0.5px solid var(--border); }
.bs-book-spine { width: 3px; flex-shrink: 0; }
.bs-book-inner { flex: 1; min-width: 0; padding: 0.85rem 0 0.85rem 0.9rem; }
.bs-book-main { display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer; }
.bs-book-content { flex: 1; min-width: 0; }
.bs-book-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
.bs-book-title {
  font-family: var(--font-serif);
  font-size: 1rem;
  letter-spacing: -0.01em;
  color: var(--fg);
  line-height: 1.25;
}
.bs-book-author { font-size: 0.78rem; color: var(--fg-muted); font-weight: 300; }
.bs-book-row2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.bs-badge {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 20px;
  border: 0.5px solid;
  white-space: nowrap;
  cursor: pointer;
  transition: opacity 0.15s;
}
.bs-badge:hover { opacity: 0.75; }
.bs-book-time { font-family: var(--font-mono); font-size: 0.6rem; color: var(--fg-faint); letter-spacing: 0.04em; }
.bs-stars { display: flex; gap: 1px; margin-top: 5px; }
.bs-star { font-size: 0.8rem; cursor: pointer; transition: color 0.1s; line-height: 1; }
.bs-star.on  { color: var(--amber); }
.bs-star.off { color: var(--border-mid); }
.bs-book-chev {
  color: var(--fg-faint);
  font-size: 0.85rem;
  flex-shrink: 0;
  padding-top: 2px;
  transition: transform 0.2s, color 0.15s;
}
.bs-book-chev.open { transform: rotate(90deg); color: var(--fg-muted); }

/* ── Expanded detail ─────────────────────────── */
.bs-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }
.bs-detail.open { display: block; }
.bs-detail-cat {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  color: var(--fg-faint);
  margin-bottom: 5px;
}
.bs-detail-why { font-size: 0.82rem; color: var(--fg-muted); line-height: 1.65; font-weight: 300; }
.bs-detail-notes {
  font-size: 0.82rem;
  color: var(--fg-muted);
  line-height: 1.6;
  font-weight: 300;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 0.5px solid var(--border);
  font-style: italic;
}

@media (max-width: 600px) {
  .bs-stats { gap: 1rem; }
  .bs-stat-val { font-size: 1.3rem; }
  .bs-mood-grid { gap: 0.3rem; }
  .bs-mood-btn-desc { display: none; }
  .bs-search { width: 150px; }
  .bs-book-title { font-size: 0.95rem; }
}
</style>

  "recommended":  { bg:"var(--s-rec-bg)",  text:"var(--s-rec-text)",  border:"var(--s-rec-border)"  },
  "want to read": { bg:"var(--s-want-bg)", text:"var(--s-want-text)", border:"var(--s-want-border)" },
  "reading":      { bg:"var(--s-read-bg)", text:"var(--s-read-text)", border:"var(--s-read-border)" },
  "finished":     { bg:"var(--s-fin-bg)",  text:"var(--s-fin-text)",  border:"var(--s-fin-border)"  },
};
const STATUS_ORDER  = ["recommended","want to read","reading","finished"];
const STATUS_LABELS = { "recommended":"recommended", "reading":"reading", "finished":"finished", "want to read":"want to read" };

// ── State ─────────────────────────────────────────
const SK = "nbp-bs-v2";
let books = [];
let catFilter = "All";
let statusFilter = "All";
let searchQ = "";
let moodOpen = false;
let activeMood = null;

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(SK) || "null");
    if (s) {
      const ids = new Set(s.map(b => b.id));
      books = [...s, ...BOOKS.filter(b => !ids.has(b.id))];
    } else {
      books = BOOKS.map(b => ({...b}));
    }
  } catch { books = BOOKS.map(b => ({...b})); }
}
function save() { try { localStorage.setItem(SK, JSON.stringify(books)); } catch {} }
function getBook(id) { return books.find(b => b.id === id); }
function updateBook(u) { books = books.map(b => b.id === u.id ? u : b); save(); }

// ── Stats ─────────────────────────────────────────
function renderStats() {
  const finished = books.filter(b => b.status === "finished");
  const hrs = finished.reduce((s, b) => s + (b.hours || 0), 0);
  document.getElementById("bs-count-label").textContent = `${books.length} books`;
  document.getElementById("bs-stats").innerHTML = [
    [books.filter(b => b.status === "reading").length, "Reading"],
    [finished.length, "Finished"],
    [hrs + "h", "Read"],
  ].map(([v, l]) => `<div class="bs-stat"><div class="bs-stat-val">${v}</div><div class="bs-stat-label">${l}</div></div>`).join("");
}

// ── Filters ───────────────────────────────────────
function renderFilters() {
  document.getElementById("bs-status-row").innerHTML =
    STATUSES.map(s => `<button class="bs-filter-pill${statusFilter===s?" active":""}" data-type="status" data-val="${s}">${s === "All" ? "All statuses" : STATUS_LABELS[s]}</button>`).join("");
  document.getElementById("bs-cat-row").innerHTML =
    CATEGORIES.map(c => `<button class="bs-filter-pill${catFilter===c?" active":""}" data-type="cat" data-val="${c}">${c === "All" ? "All categories" : CAT_SHORT[c]}</button>`).join("");
}

document.getElementById("bs-status-row").addEventListener("click", e => {
  const b = e.target.closest(".bs-filter-pill"); if (!b) return;
  statusFilter = b.dataset.val; renderFilters(); renderList();
});
document.getElementById("bs-cat-row").addEventListener("click", e => {
  const b = e.target.closest(".bs-filter-pill"); if (!b) return;
  catFilter = b.dataset.val; renderFilters(); renderList();
});

const searchEl = document.getElementById("bs-search");
const clearEl  = document.getElementById("bs-search-clear");
searchEl.addEventListener("input", () => {
  searchQ = searchEl.value.trim();
  clearEl.classList.toggle("visible", searchQ.length > 0);
  renderList();
});
clearEl.addEventListener("click", () => {
  searchQ = ""; searchEl.value = "";
  clearEl.classList.remove("visible"); renderList();
});

// ── Mood ──────────────────────────────────────────
function renderMood() {
  const arr  = document.getElementById("bs-mood-arr");
  const body = document.getElementById("bs-mood-body");
  arr.classList.toggle("open", moodOpen);
  body.classList.toggle("open", moodOpen);
  if (!moodOpen) return;

  const grid = document.getElementById("bs-mood-grid");
  const rec  = document.getElementById("bs-mood-rec");

  grid.innerHTML = MOODS.map(m =>
    `<button class="bs-mood-btn${activeMood && activeMood.id===m.id?" active":""}" data-mood="${m.id}">
      <div class="bs-mood-btn-icon">${m.icon}</div>
      <span class="bs-mood-btn-name">${m.label}</span>
      <span class="bs-mood-btn-desc">${m.desc}</span>
    </button>`
  ).join("");

  if (activeMood) {
    const pool = books.filter(b =>
      (b.status === "recommended" || b.status === "want to read") &&
      Array.isArray(b.moodFit) && b.moodFit.includes(activeMood.id)
    );
    const pick = pool[0] || books.find(b => b.status === "recommended" || b.status === "want to read");
    if (pick) {
      rec.className = "bs-mood-rec show";
      rec.innerHTML = `
        <div class="bs-mood-rec-label">${activeMood.icon} ${activeMood.label.toLowerCase()} pick</div>
        <div class="bs-mood-rec-title">${pick.title}</div>
        <div class="bs-mood-rec-author">${pick.author}</div>
        ${pick.why ? `<div class="bs-mood-rec-why">${pick.why}</div>` : ""}
        <div class="bs-mood-rec-meta">~${pick.hours}h &middot; ${pick.pages}p</div>
        <button class="bs-mood-reset" onclick="activeMood=null;renderMood();">try a different mood</button>
      `;
    }
  } else {
    rec.className = "bs-mood-rec";
    rec.innerHTML = "";
  }
}

document.getElementById("bs-mood-trigger").addEventListener("click", () => {
  moodOpen = !moodOpen;
  if (!moodOpen) activeMood = null;
  renderMood();
});
document.getElementById("bs-mood-grid").addEventListener("click", e => {
  const btn = e.target.closest(".bs-mood-btn"); if (!btn) return;
  activeMood = MOODS.find(m => m.id === btn.dataset.mood);
  renderMood();
});

// ── Stars ─────────────────────────────────────────
function starsHTML(rating, id) {
  return [1,2,3,4,5].map(n =>
    `<span class="bs-star ${n <= (rating||0) ? "on" : "off"}" data-star="${n}" data-id="${id}">★</span>`
  ).join("");
}

function bookHTML(b) {
  const spine = CAT_COLOR[b.category] || "#888780";
  const ss    = STATUS_STYLE[b.status] || STATUS_STYLE["recommended"];
  const hasDetail = b.why || b.notes;
  return `
<div class="bs-book" id="bs-book-${b.id}">
  <div class="bs-book-spine" style="background:${spine};"></div>
  <div class="bs-book-inner">
    <div class="bs-book-main" data-id="${b.id}">
      <div class="bs-book-content">
        <div class="bs-book-top">
          <span class="bs-book-title">${b.title}</span>
        </div>
        <div class="bs-book-author">${b.author}</div>
        <div class="bs-book-row2">
          <span class="bs-badge" style="background:${ss.bg};color:${ss.text};border-color:${ss.border};" data-cycle="${b.id}">${b.status}</span>
          <span class="bs-book-time">~${b.hours}h &middot; ${b.pages}p</span>
          ${b.source ? `<span class="bs-book-time">${b.source}</span>` : ""}
        </div>
        ${b.status === "finished" ? `<div class="bs-stars">${starsHTML(b.rating, b.id)}</div>` : ""}
      </div>
      ${hasDetail ? `<span class="bs-book-chev" data-id="${b.id}">›</span>` : ""}
    </div>
    ${hasDetail ? `
    <div class="bs-detail" id="bs-detail-${b.id}">
      <div class="bs-detail-cat">${CAT_SHORT[b.category] || b.category}</div>
      ${b.why   ? `<div class="bs-detail-why">${b.why}</div>` : ""}
      ${b.notes ? `<div class="bs-detail-notes">${b.notes}</div>` : ""}
    </div>` : ""}
  </div>
</div>`;
}

// ── Render list ───────────────────────────────────
function renderList() {
  const q = searchQ.toLowerCase();
  const visible = books.filter(b =>
    (catFilter === "All" || b.category === catFilter) &&
    (statusFilter === "All" || b.status === statusFilter) &&
    (!q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q))
  );
  const el = document.getElementById("bs-list");
  if (!visible.length) {
    el.innerHTML = `<div class="bs-empty">No books match this filter.</div>`;
    return;
  }
  el.innerHTML = visible.map(bookHTML).join("");
}

// ── Delegated events on list ──────────────────────
document.getElementById("bs-list").addEventListener("click", e => {
  const cycle = e.target.closest("[data-cycle]");
  if (cycle) {
    e.stopPropagation();
    const b = getBook(cycle.dataset.cycle); if (!b) return;
    const next = STATUS_ORDER[(STATUS_ORDER.indexOf(b.status) + 1) % STATUS_ORDER.length];
    updateBook({...b, status: next});
    renderStats(); renderList();
    return;
  }
  const star = e.target.closest(".bs-star");
  if (star) {
    e.stopPropagation();
    const b = getBook(star.dataset.id); if (!b) return;
    updateBook({...b, rating: parseInt(star.dataset.star)});
    const wrap = document.querySelector(`#bs-book-${b.id} .bs-stars`);
    if (wrap) wrap.innerHTML = starsHTML(parseInt(star.dataset.star), b.id);
    return;
  }
  const main = e.target.closest(".bs-book-main");
  if (main) {
    const id = main.dataset.id;
    const detail = document.getElementById(`bs-detail-${id}`);
    const chev   = main.querySelector(".bs-book-chev");
    if (detail) {
      const open = detail.classList.toggle("open");
      if (chev) chev.classList.toggle("open", open);
    }
  }
});

// ── Boot ──────────────────────────────────────────
load();
renderStats();
renderFilters();
renderMood();
renderList();
</script>

function tagClass(tag) {
  if (tag === 'veg')    return 'br-tag-veg';
  if (tag === 'pantry') return 'br-tag-pantry';
  return 'br-tag-quick';
}

function renderTOC() {
  const list = document.getElementById('toc-list');
  list.innerHTML = recipes.map((r, i) => `
    <li class="toc-item">
      <span class="toc-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="toc-name">${r.name}</span>
      <span class="toc-tag">${r.tagLabel} · ${r.time}</span>
    </li>
  `).join('');
}

function renderRecipes() {
  const container = document.getElementById('booklet-recipes');
  container.innerHTML = recipes.map(r => {
    const ings = r.ingredients.map(ing => {
      if (ing.startsWith('—') && ing.endsWith('—')) {
        return `<li class="section-label">${ing.replace(/—/g, '').trim()}</li>`;
      }
      return `<li>${ing}</li>`;
    }).join('');

    const optHTML = r.optional && r.optional.length
      ? `<li class="section-label">Optional</li>${r.optional.map(o => `<li>${o}</li>`).join('')}`
      : '';

    return `
      <div class="booklet-recipe">
        <span class="br-tag ${tagClass(r.tag)}">${r.tagLabel}</span>
        <div class="br-title">${r.name}</div>
        <div class="br-sub">${r.time} &middot; ${r.servings}</div>
        <div class="br-desc">${r.description}</div>
        <div class="br-cols">
          <div>
            <div class="br-label">Ingredients</div>
            <ul class="br-ing-list">${ings}${optHTML}</ul>
          </div>
          <div>
            <div class="br-label">Steps</div>
            <ol class="br-steps-list">${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('booklet-meta').textContent =
  `${recipes.length} recipes — all vegetarian`;

renderTOC();
renderRecipes();
</script>

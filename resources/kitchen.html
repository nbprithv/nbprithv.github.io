  display: inline-block;

  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 2px 9px;
  border-radius: 20px;
  border: 0.5px solid transparent;
  margin-bottom: 0.55rem;

.tag-veg    { background: var(--k-veg-bg);   color: var(--k-veg-text);  border-color: var(--k-veg-bdr); }

.recipe-card h3 {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 1rem;
  font-weight: 400;
  color: var(--fg);
  line-height: 1.3;

  font-size: 0.81rem;
  color: var(--fg-muted);
  padding: 0.45rem 1.25rem 0.9rem;
  line-height: 1.55;

.recipe-meta {
  display: flex;
  gap: 1.25rem;
  padding: 0.65rem 1.25rem;
  border-top: 0.5px solid var(--border);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.03em;
  color: var(--fg-faint);
}

    colorClass: "store-wf",
    categories: {
      "Produce": ["Cabbage", "Cauliflower", "Carrots", "Onion", "Ginger", "Green beans", "Eggplant", "Cilantro", "Green chilies", "Potatoes", "Broccoli", "Spinach", "Sweet potato", "Mandarin oranges", "Salad mix", "Apple", "Strawberry", "Avocado", "Mango", "Zucchini", "Oranges", "Lemons", "Green plantain", "Butternut squash", "Pomegranate", "Parsley", "Edamame", "Shallots", "Grapes"],
      "Frozen": ["Frozen fries", "Frozen tater tots", "Frozen peas", "Frozen okra", "Frozen green beans", "Frozen broccoli", "Frozen spinach", "Frozen chicken fingers", "Frozen pastry sheets"],
      "Sauces & Condiments": ["Jelly", "Nut butter", "Marinara sauce", "Honey"],
      "Breads & Cereals": ["Bread", "Cheerios", "Bagel", "Flour tortilla", "Pita bread", "Tortilla"],
      "Spices": ["Cloves (whole)"],

};

function showSection(id, btn) {
  document.querySelectorAll('.k-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.kitch-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'pantry') renderPantry('all');
}

function getTagClass(tag) {
  return tag === 'veg' ? 'tag-veg' : tag === 'pantry' ? 'tag-pantry' : 'tag-quick';
}

function renderRecipes() {
  const grid = document.getElementById('recipes-grid');
  grid.innerHTML = recipes.map(r => `
    <div class="recipe-card" onclick="openRecipe(${r.id})">
      <div class="recipe-card-header">
        <span class="recipe-tag ${getTagClass(r.tag)}">${r.tagLabel}</span>
        <h3>${r.name}</h3>
      </div>
      <p class="recipe-card-desc">${r.description}</p>
      <div class="recipe-meta">
        <span>${r.time}</span>
        <span>${r.servings}</span>
      </div>
    </div>
  `).join('');
}

function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  document.getElementById('modal-title').textContent = r.name;
  document.getElementById('modal-meta').textContent = r.time + ' · ' + r.servings;
  document.getElementById('modal-ingredients').innerHTML = r.ingredients
    .map(i => `<span class="ing-pill">${i}</span>`).join('');

  const optWrap = document.getElementById('modal-optional-wrap');
  if (r.optional && r.optional.length) {
    optWrap.style.display = 'block';
    document.getElementById('modal-optional').innerHTML = r.optional
      .map(i => `<span class="ing-pill optional">${i}</span>`).join('');
  } else {
    optWrap.style.display = 'none';
  }

  document.getElementById('modal-steps').innerHTML = r.steps
    .map(s => `<li>${s}</li>`).join('');

  document.getElementById('k-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('k-modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('k-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderPantry(storeFilter) {
  const container = document.getElementById('pantry-content');
  const stores = storeFilter === 'all' ? Object.keys(pantryData) : [storeFilter];
  container.innerHTML = stores.map(key => {
    const store = pantryData[key];
    const totalItems = Object.values(store.categories).flat().length;
    const categoriesHTML = Object.entries(store.categories).map(([cat, items]) => `
      <div class="category-block">
        <div class="category-label">${cat}</div>
        <div class="items-wrap">
          ${items.map(i => `<span class="item-chip">${i}</span>`).join('')}
        </div>
      </div>
    `).join('');
    return `
      <div class="store-section" data-store="${key}">
        <div class="store-header">
          <span class="store-name">${store.label}</span>
          <span class="store-badge ${store.colorClass}">${store.label}</span>
          <span class="store-count">${totalItems} items</span>
        </div>
        ${categoriesHTML}
      </div>
    `;
  }).join('');
}

function filterStore(store, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPantry(store);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

renderRecipes();
</script>
